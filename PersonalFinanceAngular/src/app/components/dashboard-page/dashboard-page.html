<div class="container-fluid p-4">
  <div class="row dashboard-container rounded-5 shadow-lg">

    <aside class="sidebar col-auto d-flex flex-column p-4">
      <app-aside-component></app-aside-component>
    </aside>

    <main class="col p-4 text-light">
      <header class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold m-0">Welcome back, <span class="text-info">{{username}}</span></h2>

        <div class="col-md-3 col-lg-2 mb-4">
          <label class="form-label d-flex align-items-center">
            <i class="bi bi-calendar3 me-2 text-info"></i> Period
          </label>

          <div class="input-group custom-glass-select">
            <select class="form-select border-0" formControlName="month">
              <option value="" disabled selected>Select month...</option>
              @for (month of months; track month){
                <option [value]="month" class="bg-dark text-white">{{month}}</option>
              }
            </select>
          </div>
        </div>

      </header>

      <div class="row g-4">
        <div class="col-lg-4 col-md-5">
          <div class="d-flex flex-column gap-3">

            <div class="finance-card p-4 shadow-sm">
              <small class="metric-label">Total Balance</small>
              <h3 class="fw-bold mb-0">{{(totalMonthly?.incomes || 0) - (totalMonthly?.expenses || 0) | currency:'BRL'}}</h3>
            </div>

            <div class="finance-card p-4 shadow-sm border-start border-2 border-success">
              <small class="metric-label">Monthly Income</small>
              <h3 class="fw-bold mb-0 text-success">{{(totalMonthly?.incomes || 0) | currency:'BRL'}}</h3>
            </div>

            <div class="finance-card p-4 shadow-sm border-start border-2 border-danger">
              <small class="metric-label">Monthly Expenses</small>
              <h3 class="fw-bold mb-0 text-danger">{{(totalMonthly?.expenses || 0) | currency:'BRL'}}</h3>
            </div>

          </div>
        </div>

        <div class="col-lg-8 col-md-7">
          <div class="chart-placeholder h-100 p-4">
            <img class="img-fluid rounded-4 shadow"
                 src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fwww.kandasoft.com%2Fimages%2F2024%2F05%2FChart-7.png"
                 alt="Financial Chart" style="max-height: 450px; width: 100%; object-fit: cover;">
          </div>
        </div>
      </div>
    </main>

  </div>
</div>
